<!DOCTYPE html>
<html>
    <head>
        <title>Vinci</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="../static/css/index.css">
    </head>
    <body>


            <div class="challenges" id="challenges">
                <p class="challenge-title">Pick a challenge</p>
                <p class="challenge-subtitle">Choose a coding challenge to practice your skills.</p>

                <div class="challenge-container" id="challenge-container">
                </div>
            </div> 

            <div class="chat-header" id="chat-header">
                <div class="stage-track">
                    <div class="stage-pill active" id="stage-pill-1">1 · Socratic</div>
                    <div class="stage-arrow">→</div>
                    <div class="stage-pill" id="stage-pill-2">2 · Code Review</div>
                    <div class="stage-arrow">→</div>
                    <div class="stage-pill" id="stage-pill-3">3 · Solution</div>
                </div>
                <button class="next-stage-btn" id="next-stage-btn">Move to Code Review →</button>
            </div>

            <div class="chat-container" id="chat-container">

            </div>

            <div class="prompt-bar-container" id="prompt-bar-container">
                <div class="prompt-added-file" id="promptAddedFile">
                    
                </div>
                <div class="prompt-bar-main">
                    <input type="file" id="fileInput" accept=".py" hidden> 
                    <label for="fileInput" class="prompt-file-button">
                        <img class="prompt-file-icon" src="../static/img/plus.png">
                    </label>
                    <textarea class="prompt-textarea" id="promptTextArea" placeholder="Ask about your code"></textarea>
                    <button class="prompt-send-button" id="sendButton">
                        <img class="prompt-send-icon" src="../static/img/send.png">
                    </button>

            
                </div>
                
            </div>

            <button id="sendBtn" type="button">Send</button>region 
           
        </div>

        <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
        <script src="../static/scripts/index.js"></script>
   


    </body>
</html>
