<!DOCTYPE html>
<html>
    <head>
        <title>Vinci</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="../static/css/index.css">
    </head>
    <body>

        <nav class="top-nav">
            <span class="nav-brand">Vinci</span>
            <div style="display:flex; align-items:center; gap:12px;">
                <span class="nav-username">👋 {{ username }}</span>
                <form method="POST" action="/logout" style="margin:0;">
                    <button class="nav-logout-btn" type="submit">Sign out</button>
                </form>
                <a class="nav-portfolio-btn" href="https://www.allankangethe.com" target="_blank" rel="noopener">Allan Kangethe ↗</a>
            </div>
        </nav>

        <!-- Toast container -->
        <div id="toast-container"></div>

        <!-- Pre-challenge knowledge check modal -->
        <div class="modal-overlay" id="pre-check-modal" style="display:none;">
            <div class="modal-card">
                <p class="modal-title">Quick Check ✏️</p>
                <p class="modal-question" id="pre-check-question"></p>
                <textarea class="modal-textarea" id="pre-check-answer" placeholder="Write your thoughts here..."></textarea>
                <button class="modal-submit-btn" id="pre-check-submit">Start Challenge →</button>
            </div>
        </div>

        <div class="challenges" id="challenges">
            <p class="challenge-title">Pick a challenge</p>
            <p class="challenge-subtitle">Choose a coding challenge to practice your skills.</p>
            <div class="challenge-container" id="challenge-container"></div>
        </div>

        <div class="chat-header" id="chat-header">
            <div style="display:flex; align-items:center; gap:12px;">
                <button class="back-btn" id="back-btn">← Back</button>
                <span class="chat-challenge-name" id="chat-challenge-name"></span>
            </div>
            <div class="stage-track">
                <div class="stage-pill active" id="stage-pill-1">1 · Socratic</div>
                <div class="stage-arrow">→</div>
                <div class="stage-pill" id="stage-pill-2">2 · Code Review</div>
                <div class="stage-arrow">→</div>
                <div class="stage-pill" id="stage-pill-3">3 · Solution</div>
            </div>
            <button class="next-stage-btn" id="next-stage-btn">Move to Code Review →</button>
        </div>

        <div class="session-summary" id="session-summary" style="display:none;">
            <div class="summary-card">
                <button class="summary-close-btn" id="summary-close-btn">✕</button>
                <p class="summary-title">Session Complete 🎉</p>
                <div class="summary-stats" id="summary-stats"></div>
                <button class="summary-back-btn" id="summary-back-btn">Try Another Challenge →</button>
            </div>
        </div>

        <div class="chat-container" id="chat-container"></div>

        <div class="prompt-bar-container" id="prompt-bar-container">
            <div class="prompt-added-file" id="promptAddedFile"></div>
            <div class="prompt-bar-main">
                <input type="file" id="fileInput" accept=".py" hidden>
                <label for="fileInput" class="prompt-file-button">
                    <img class="prompt-file-icon" src="../static/img/plus.png">
                </label>
                <textarea class="prompt-textarea" id="promptTextArea" placeholder="Ask about your code"></textarea>
                <button class="prompt-send-button" id="sendButton">
                    <img class="prompt-send-icon" src="../static/img/send.png">
                </button>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
        <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js"></script>
        <script src="../static/scripts/index.js"></script>

    </body>
</html>
